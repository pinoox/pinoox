# Pinoox storage — deny direct web access (Nginx)
#
# Nginx does not load this file from the storage folder automatically.
# Copy or include this block inside your `server { }` configuration.
# Adjust the location prefix if PINOOX_STORAGE_PATH or the public URL differs.

location ^~ /storage/ {
    deny all;
    return 403;
}

# Optional: when storage lives outside the web root but is aliased:
# location ^~ /private-storage/ {
#     deny all;
#     return 403;
# }
